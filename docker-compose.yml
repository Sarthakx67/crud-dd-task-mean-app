services:
  mongo:
    image: mongo:5
    container_name: crud-dd-task-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=dd_db
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: crud-dd-task-backend
    restart: always
    environment:
      - NODE_ENV=production
      - DB_URL=mongodb://mongo:27017/dd_db
    ports:
      - "8080:8080"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: crud-dd-task-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
